<!DOCTYPE html>
<html lang="zh-TW" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock & Jessie | Love in London</title>
    
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Rock & Jessie | Love in London" />
    <meta property="og:description" content="2026.12.12 期待與你一起分享我們的幸福🤍🖤" />
    <meta property="og:image" content="https://weij727.github.io/rock-jessie-wedding/shortcut.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Rock & Jessie | Love in London" />
    <meta name="twitter:description" content="2026.12.12 期待與你一起分享我們的幸福🤍🖤" />
    <meta name="twitter:image" content="https://weij727.github.io/rock-jessie-wedding/shortcut.png" />
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Noto+Serif+TC:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        tailwind.config = { theme: { extend: { colors: { morandi: { sun: '#d4a373', green: '#8da399', bg: '#fdfbf7', text: '#4a4a4a' } }, fontFamily: { cormorant: ['"Cormorant Garamond"', 'serif'], noto: ['"Noto Serif TC"', 'serif'], }, boxShadow: { 'glow': '0 8px 30px rgba(0, 0, 0, 0.06)', } } } }
    </script>
    
    <style>
        body { font-family: 'Noto Serif TC', serif; background-color: #fdfbf7; color: #4a4a4a; overflow-x: hidden; }
        h1, h2, h3, .font-cormorant { font-family: 'Cormorant Garamond', serif; }
        .v-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(212, 163, 115, 0.2); box-shadow: 0 10px 40px rgba(0, 0, 0, 0.04); }
    </style>
</head>
<body class="antialiased selection:bg-morandi-sun selection:text-white">

    <header class="w-full bg-white h-[12vh] md:h-auto md:py-6 flex flex-col justify-center items-center relative z-20 shadow-sm">
        <h1 class="font-cormorant text-xl md:text-3xl text-morandi-text tracking-widest leading-loose text-center">
            Rock & Jessie<br>
            <span class="text-base md:text-xl text-morandi-sun block -mt-1 md:-mt-1">Wedding Invitation</span>
        </h1>
    </header>

    <div class="w-full bg-[#fdfbf7] flex justify-center">
        <div id="crop-wrapper" class="w-full max-w-4xl overflow-hidden relative">
            <!-- 移除 inline onload 以避免 ReferenceError -->
            <img src="IMG_9201.PNG" id="hero-img" alt="Rock & Jessie" class="w-full h-auto block">
        </div>
    </div>

    <section class="py-16 px-6 max-w-3xl mx-auto">
        <div class="v-card rounded-3xl p-8 md:p-14 text-center relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-morandi-sun/20 via-morandi-sun to-morandi-sun/20"></div>
            <i data-lucide="calendar-heart" class="w-8 h-8 mx-auto text-morandi-sun mb-4"></i>
            <h2 class="font-cormorant text-2xl md:text-3xl text-morandi-green tracking-widest mb-1 whitespace-nowrap">Wedding Info</h2>
            <p class="text-sm tracking-widest text-gray-400 mb-8 uppercase">婚禮資訊</p>
            <div class="space-y-1 text-lg mb-8 pb-6 border-b border-morandi-sun/10">
                <p class="tracking-wider text-morandi-text font-medium">2026.12.12 Sat.</p>
                <p class="tracking-wider text-morandi-text font-medium">入席時間 / 17:30</p>
                <p class="tracking-wider text-morandi-text font-medium">正式開始 / 18:00</p>
            </div>
            <div class="space-y-1 text-lg mb-8">
                <i data-lucide="map-pin" class="w-5 h-5 mx-auto text-morandi-green mb-3"></i>
                <p class="font-semibold text-lg md:text-xl tracking-wider md:tracking-widest text-morandi-text whitespace-nowrap">GUMGUM EGG</p>
                <p class="text-sm tracking-widest text-gray-500 mb-2">(小巨蛋店)</p>
                <p class="text-gray-600 mt-2"><span class="whitespace-nowrap">臺北市松山區</span><span class="whitespace-nowrap">南京東路四段2號1樓1號</span></p>
                <div class="pt-4">
                    <a href="https://maps.app.goo.gl/jHxPSmR1fUn1aUHx7" target="_blank" class="inline-flex items-center gap-2 px-6 py-2 border border-morandi-sun text-morandi-sun hover:bg-morandi-sun hover:text-white rounded-full transition-colors text-sm tracking-widest">
                        <i data-lucide="map" class="w-4 h-4"></i> 開啟 Google Map
                    </a>
                </div>
            </div>
        </div>
    </section>

    <section id="rsvp" class="py-16 px-6 bg-white relative border-t border-gray-50">
        <div class="max-w-2xl mx-auto relative z-10">
            <div class="text-center mb-12">
                <h2 class="font-cormorant text-4xl text-morandi-sun tracking-widest mb-3">R.S.V.P</h2>
                <p class="tracking-widest text-morandi-green">期待與你一起分享我們的幸福</p>
            </div>

            <!-- 恢復您的 iframe 提交架構 -->
            <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;" onload="if(submitted){showSuccessMessage();}"></iframe>

            <form id="rsvp-form" action="https://docs.google.com/forms/d/e/1FAIpQLScB6odivFNS7KHTW7sMifh9Ue5LGnnf9G80DFYUpCgZXTo_uw/formResponse" method="POST" target="hidden_iframe" onsubmit="return handleFormSubmit(event);" class="space-y-10 bg-morandi-bg/30 p-8 md:p-12 rounded-3xl border border-morandi-sun/10 shadow-glow">
                
                <div class="flex flex-col group"><label class="tracking-widest mb-1 text-morandi-text font-medium flex items-center"><span class="text-red-400 mr-1">*</span>名字 <span class="text-xs text-gray-400 font-sans ml-2 tracking-normal">NAME</span></label><input type="text" name="entry.1191853836" required class="bg-transparent border-b border-gray-300 py-2 focus:outline-none focus:border-morandi-sun transition-colors rounded-none"></div>
                <div class="flex flex-col group"><label class="tracking-widest mb-1 text-morandi-text font-medium flex items-center"><span class="text-red-400 mr-1">*</span>手機 <span class="text-xs text-gray-400 font-sans ml-2 tracking-normal">PHONE</span></label><input type="tel" name="entry.1403497391" required class="bg-transparent border-b border-gray-300 py-2 focus:outline-none focus:border-morandi-sun transition-colors rounded-none"></div>
                <div class="flex flex-col group"><label class="tracking-widest mb-1 text-morandi-text font-medium flex items-center"><span class="text-red-400 mr-1">*</span>Email <span class="text-xs text-gray-400 font-sans ml-2 tracking-normal">EMAIL</span></label><input type="email" name="entry.901721493" required class="bg-transparent border-b border-gray-300 py-2 focus:outline-none focus:border-morandi-sun transition-colors rounded-none"></div>
                <div class="flex flex-col group"><label class="tracking-widest mb-1 text-morandi-text font-medium flex items-center"><span class="text-red-400 mr-1">*</span>我想對新郎 / 新娘說： <span class="text-xs text-gray-400 font-sans ml-2 tracking-normal">MESSAGE</span></label><textarea name="entry.1977595338" required rows="3" class="bg-transparent border-b border-gray-300 py-2 focus:outline-none focus:border-morandi-sun transition-colors resize-none rounded-none placeholder:text-gray-300 mt-2"></textarea></div>
                
                <div class="pt-6">
                    <button type="submit" id="submit-btn" class="w-full bg-morandi-sun hover:bg-[#c29263] text-white tracking-[0.2em] py-4 rounded-xl transition-colors duration-300 shadow-md">確定送出</button>
                </div>
            </form>
            
            <div id="success-message" class="hidden mt-8 p-10 bg-white border border-morandi-sun/20 shadow-glow rounded-3xl text-center">
                <h3 class="font-cormorant text-3xl text-morandi-green tracking-widest mb-3 font-medium">Thank You!</h3>
                <p class="text-gray-600 tracking-wider mb-2">成功送出，我們收到你的祝福與回覆囉</p>
            </div>
        </div>
    </section>

    <!-- Modal 維持不變 -->
    <div id="photo-reminder-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center px-6 bg-black/40 backdrop-blur-sm">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full text-center shadow-2xl">
            <h3 class="font-cormorant text-2xl text-morandi-text tracking-widest mb-2 font-medium">還沒上傳合照喔！</h3>
            <button onclick="closeReminderModal()" class="w-full bg-morandi-sun text-white py-3 mb-2 rounded-xl">去上傳</button>
            <button onclick="proceedWithoutPhoto()" class="w-full bg-gray-100 text-gray-500 py-3 rounded-xl">直接送出</button>
        </div>
    </div>

    <script>
        lucide.createIcons();
        let submitted = false;
        let isPhotoUploaded = false;

        // 獨立初始化與調整圖片邏輯
        window.addEventListener('load', function() {
            adjustImageCrop();
        });

        function adjustImageCrop() {
            const img = document.getElementById('hero-img');
            const wrapper = document.getElementById('crop-wrapper');
            if (img && wrapper && img.offsetHeight > 0) {
                const imgHeight = img.offsetHeight;
                const topCrop = imgHeight * 0.05;
                const bottomCrop = imgHeight * 0.22;
                wrapper.style.height = (imgHeight - topCrop - bottomCrop) + 'px';
                img.style.marginTop = '-' + topCrop + 'px';
            }
        }

        function handleFormSubmit(event) {
            if (!isPhotoUploaded) {
                event.preventDefault();
                document.getElementById('photo-reminder-modal').classList.remove('hidden');
                return false;
            }
            submitted = true;
            document.getElementById('rsvp-form').target = "hidden_iframe"; // 確保強指定 target
            return true;
        }

        function closeReminderModal() { document.getElementById('photo-reminder-modal').classList.add('hidden'); }

        function proceedWithoutPhoto() {
            isPhotoUploaded = true;
            submitted = true;
            document.getElementById('rsvp-form').target = "hidden_iframe"; // 強指定 target
            document.getElementById('rsvp-form').submit();
        }

        function showSuccessMessage() {
            document.getElementById('rsvp-form').style.display = 'none';
            document.getElementById('success-message').classList.remove('hidden');
        }
    </script>
</body>
</html>
